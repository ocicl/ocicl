name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  fetch-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ocicl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl
          gh release download --repo ocicl/ocicl --pattern '*_amd64.deb' --dir /tmp
          sudo dpkg -i /tmp/ocicl_*_amd64.deb
          ocicl setup > ~/.sbclrc

      - name: Fetch dependencies
        run: ocicl install

      - name: Generate SBOMs
        run: |
          ocicl create-sbom cyclonedx <%= @ app-name %>-sbom.json
          ocicl create-sbom spdx <%= @ app-name %>-sbom.spdx.json

      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: ocicl-deps
          path: ocicl
          retention-days: 1

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            <%= @ app-name %>-sbom.json
            <%= @ app-name %>-sbom.spdx.json
          retention-days: 1

  build-linux-tarball:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl build-essential

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Build
        run: make

      - name: Package Linux binary
        run: |
          mkdir -p dist
          cp <%= @ app-name %> dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar czf ../<%= @ app-name %>-${VERSION}-linux-amd64.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: ./*.tar.gz

  build-rpm:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: Install build dependencies
        run: dnf install -y rpm-build rpmdevtools rpm-sign sbcl libfixposix-devel gcc make

      - name: Setup rpmbuild
        run: rpmdev-setuptree

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Create source tarball
        run: |
          cd ..
          tar czf ~/rpmbuild/SOURCES/<%= @ app-name %>-${VERSION}.tar.gz \
            --transform "s,^<%= @ app-name %>,<%= @ app-name %>-${VERSION}," \
            <%= @ app-name %>

      - name: Update spec version and build
        run: |
          sed -i "s/^Version:.*/Version:        ${VERSION}/" releng/<%= @ app-name %>.spec
          cp releng/<%= @ app-name %>.spec ~/rpmbuild/SPECS/
          cd ~/rpmbuild/SPECS
          rpmbuild -ba <%= @ app-name %>.spec

      - name: Sign RPMs
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_NAME=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid/{print $10; exit}')
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${GPG_NAME}" >> ~/.rpmmacros
          rpmsign --addsign ~/rpmbuild/RPMS/x86_64/*.rpm

      - name: Copy RPMs to workspace
        run: cp ~/rpmbuild/RPMS/x86_64/*.rpm ${GITHUB_WORKSPACE}/ || true

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: ./*.rpm

  build-deb:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y debhelper devscripts sbcl libfixposix-dev gcc make gpg debsigs

      - name: Update changelog version
        run: |
          sed -i "s/^<%= @ app-name %> (.*/<%= @ app-name %> (${VERSION}-1) unstable; urgency=medium/" releng/debian/changelog

      - name: Build DEB packages
        run: |
          ln -s releng/debian debian
          dpkg-buildpackage -uc -us

      - name: Sign DEB packages
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          for deb in ../*.deb; do
            debsigs --sign=origin -k "${GPG_KEYID}" "${deb}"
          done

      - name: Copy DEB files to workspace
        run: |
          cp ../*.deb . 2>/dev/null || true
          cp ../*.dsc . 2>/dev/null || true
          cp ../*.tar.* . 2>/dev/null || true

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ./*.deb

  sign-artifacts:
    needs: [build-linux-tarball, extract-version]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: ./artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign tarball with Cosign
        run: |
          cd artifacts
          cosign sign-blob --yes \
            --bundle <%= @ app-name %>-${VERSION}-linux-amd64.tar.gz.bundle \
            <%= @ app-name %>-${VERSION}-linux-amd64.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-package
          path: artifacts/*.bundle

  generate-provenance-subjects:
    needs: [build-linux-tarball, build-rpm, build-deb, extract-version]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate hashes
        id: hash
        run: |
          cd artifacts
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    needs: [generate-provenance-subjects]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.generate-provenance-subjects.outputs.hashes }}"
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  release:
    needs: [build-linux-tarball, build-rpm, build-deb, sign-artifacts, slsa-provenance, extract-version]
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.json' \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.sha256

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: docs/release-notes/RELEASE-NOTES-${{ env.VERSION }}.md
          artifacts: |
            artifacts/rpm-packages/*.rpm
            artifacts/deb-packages/*.deb
            artifacts/linux-package/*.tar.gz
            artifacts/sbom/*
            artifacts/signed-package/*.bundle
            checksums.sha256
          allowUpdates: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/rpm-packages/*.rpm
            artifacts/deb-packages/*.deb
            artifacts/linux-package/*.tar.gz

  build-rpm-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install createrepo_c
        run: sudo apt-get install -y createrepo-c

      - name: Download RPM assets from release
        run: |
          mkdir -p /tmp/rpms
          gh release download "${TAG}" --pattern '*.rpm' --dir /tmp/rpms --skip-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build repodata
        run: createrepo_c /tmp/rpms

      - name: Rewrite package locations to release asset URLs
        run: |
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cd /tmp/rpms/repodata
          gunzip -f *-primary.xml.gz
          PRIMARY=$(ls *-primary.xml)
          sed -i "s|<location href=\"\([^\"]*\.rpm\)\"|<location href=\"${BASE}/\1\"|g" "${PRIMARY}"
          gzip -9 "${PRIMARY}"
          cd /tmp/rpms
          REPODATA=repodata
          cat > "${REPODATA}/repomd.xml" <<'XMLHEADER'
          <?xml version="1.0" encoding="UTF-8"?>
          <repomd xmlns="http://linux.duke.edu/metadata/repo">
          XMLHEADER
          for gz in "${REPODATA}"/*.xml.gz; do
            fname="$(basename "${gz}")"
            type="$(echo "${fname}" | sed 's/.*-\([a-z_]*\)\.xml\.gz/\1/')"
            checksum="$(sha256sum "${gz}" | awk '{print $1}')"
            size="$(stat -c%s "${gz}")"
            open_file="${gz%.gz}"
            gunzip -k -f "${gz}"
            open_checksum="$(sha256sum "${open_file}" | awk '{print $1}')"
            open_size="$(stat -c%s "${open_file}")"
            rm -f "${open_file}"
            cat >> "${REPODATA}/repomd.xml" <<XMLDATA
            <data type="${type}">
              <checksum type="sha256">${checksum}</checksum>
              <open-checksum type="sha256">${open_checksum}</open-checksum>
              <location href="repodata/${fname}"/>
              <size>${size}</size>
              <open-size>${open_size}</open-size>
            </data>
          XMLDATA
          done
          echo "</repomd>" >> "${REPODATA}/repomd.xml"
          sed -i 's/^          //' "${REPODATA}/repomd.xml"

      - name: Sign repomd.xml
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          gpg --batch --detach-sign --armor /tmp/rpms/repodata/repomd.xml
          gpg --batch --export --armor > /tmp/rpms/RPM-GPG-KEY-<%= @ app-name %>

      - name: Upload RPM repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-repo
          path: /tmp/rpms/repodata/

      - name: Upload RPM GPG key
        if: ${{ hashFiles('/tmp/rpms/RPM-GPG-KEY-<%= @ app-name %>') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rpm-repo-key
          path: /tmp/rpms/RPM-GPG-KEY-<%= @ app-name %>

  build-deb-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install APT repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gpg

      - name: Download DEB assets from release
        run: |
          mkdir -p /tmp/debs
          gh release download "${TAG}" --pattern '*.deb' --dir /tmp/debs --skip-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          gpg --batch --export --armor > /tmp/debs/<%= @ app-name %>-archive-keyring.gpg

      - name: Build APT repository
        run: |
          REPO_DIR=/tmp/apt-repo
          mkdir -p "${REPO_DIR}/pool/main" "${REPO_DIR}/dists/stable/main/binary-amd64"
          cp /tmp/debs/*.deb "${REPO_DIR}/pool/main/"
          cd "${REPO_DIR}"
          dpkg-scanpackages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          cd dists/stable
          cat > Release <<EOF
          Origin: <%= @ app-name %>
          Label: <%= @ app-name %>
          Suite: stable
          Codename: stable
          Date: $(date -Ru)
          Architectures: amd64
          Components: main
          Description: <%= @ app-name %> APT repository
          EOF
          sed -i 's/^          //' Release
          {
            echo "MD5Sum:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              printf " %s %16d %s\n" "$(md5sum "$f" | awk '{print $1}')" "$(stat -c%s "$f")" "$f"
            done
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              printf " %s %16d %s\n" "$(sha256sum "$f" | awk '{print $1}')" "$(stat -c%s "$f")" "$f"
            done
          } >> Release

      - name: Sign Release file
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          cd /tmp/apt-repo/dists/stable
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Upload DEB repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-repo
          path: /tmp/apt-repo/

      - name: Upload DEB keyring
        if: ${{ hashFiles('/tmp/debs/<%= @ app-name %>-archive-keyring.gpg') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deb-repo-key
          path: /tmp/debs/<%= @ app-name %>-archive-keyring.gpg

  deploy-pages:
    needs: [build-rpm-repo, build-deb-repo]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM repo artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-repo
          path: docs/rpm-repo/repodata

      - name: Download RPM GPG key
        uses: actions/download-artifact@v4
        with:
          name: rpm-repo-key
          path: docs/rpm-repo
        continue-on-error: true

      - name: Download DEB repo artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-repo
          path: docs/deb-repo

      - name: Download DEB keyring
        uses: actions/download-artifact@v4
        with:
          name: deb-repo-key
          path: docs/deb-repo
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
