name: Test Package Building

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: el7
            container: centos:7
            pkg_manager: yum
            sbcl_bootstrap: "1.4.16"
            install_cmd: yum install -y
            extra_setup: |
              sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-*.repo
              sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
              yum install -y centos-release-scl
              sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-SCL*.repo
              sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-SCL*.repo
              yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++
              echo "/opt/rh/devtoolset-11/root/usr/bin" >> $GITHUB_PATH
          - target: el8
            container: almalinux:8
            pkg_manager: dnf
            sbcl_bootstrap: "2.2.9"
            install_cmd: dnf install -y
            extra_setup: ""
          - target: el9
            container: almalinux:9
            pkg_manager: dnf
            sbcl_bootstrap: "2.4.11"
            install_cmd: dnf install -y
            extra_setup: ""
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Extra setup for container
        if: matrix.extra_setup != ''
        run: ${{ matrix.extra_setup }}

      - name: Install build dependencies
        run: |
          ${{ matrix.pkg_manager }} install -y rpm-build rpmdevtools gcc make grep git wget bzip2 zlib-devel

      - name: Build and install SBCL from source
        env:
          SBCL_VERSION: "2.6.3"
          SBCL_BOOTSTRAP: ${{ matrix.sbcl_bootstrap }}
        run: |
          cd /tmp
          wget -q https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_BOOTSTRAP}/sbcl-${SBCL_BOOTSTRAP}-x86-64-linux-binary.tar.bz2
          tar xjf sbcl-${SBCL_BOOTSTRAP}-x86-64-linux-binary.tar.bz2
          cd sbcl-${SBCL_BOOTSTRAP}-x86-64-linux && INSTALL_ROOT=/usr/local sh install.sh && cd ..
          wget -q https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-source.tar.bz2
          tar xjf sbcl-${SBCL_VERSION}-source.tar.bz2
          cd sbcl-${SBCL_VERSION}
          sh make.sh --prefix=/usr/local
          INSTALL_ROOT=/usr/local sh install.sh
          sbcl --version

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup rpmbuild directory
        run: rpmdev-setuptree

      - name: Create source tarball
        run: |
          VERSION=$(grep '^\s*:version' ocicl.asd | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Building version: $VERSION"
          # Create tarball with proper directory prefix for rpmbuild
          mkdir -p /tmp/ocicl-${VERSION}
          cp -r . /tmp/ocicl-${VERSION}/
          rm -rf /tmp/ocicl-${VERSION}/.git
          tar czf ~/rpmbuild/SOURCES/ocicl-${VERSION}.tar.gz -C /tmp ocicl-${VERSION}

      - name: Build RPM and SRPM
        run: |
          VERSION=$(grep '^\s*:version' ocicl.asd | head -1 | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/^Version:.*/Version:        ${VERSION}/" releng/ocicl.spec
          cp releng/ocicl.spec ~/rpmbuild/SPECS/
          cd ~/rpmbuild/SPECS
          rpmbuild -ba ocicl.spec

      - name: List built packages
        run: |
          echo "Binary RPMs (${{ matrix.target }}):"
          ls -lh ~/rpmbuild/RPMS/x86_64/
          echo "Source RPMs:"
          ls -lh ~/rpmbuild/SRPMS/

      - name: Verify version is not dirty
        run: |
          OCICL_BIN=$(find ~/rpmbuild/BUILD -name ocicl -type f -executable | head -1)
          VERSION=$("$OCICL_BIN" version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Test installation
        run: |
          ${{ matrix.install_cmd }} ~/rpmbuild/RPMS/x86_64/*.rpm
          ocicl version

  test-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y debhelper devscripts sbcl gcc make

      - name: Build DEB packages (binary and source)
        run: |
          ln -s releng/debian debian
          dpkg-buildpackage -uc -us

      - name: List built packages
        run: |
          echo "Binary packages:"
          ls -lh ../*.deb 2>/dev/null || true
          echo "Source packages:"
          ls -lh ../*.dsc ../*.tar.* 2>/dev/null || true

      - name: Verify version is not dirty
        run: |
          VERSION=$(./ocicl version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Test installation
        run: |
          apt-get install -y ../*.deb
          ocicl version

  test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install SBCL and build tools
        shell: powershell
        run: |
          choco install -y sbcl --version 2.5.11
          choco install -y nsis

      - name: Build
        run: sbcl --load setup.lisp

      - name: Verify version is not dirty
        run: |
          VERSION=$(./ocicl.exe version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Test binary
        run: |
          ./ocicl.exe version
          ./ocicl.exe help

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^\s*:version' ocicl.asd | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Collect third-party licenses
        run: |
          ./ocicl.exe collect-licenses > THIRD-PARTY-LICENSES.txt

      - name: Package Windows binary (ZIP)
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item ocicl.exe, README.md, LICENSE, THIRD-PARTY-LICENSES.txt -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath "ocicl-$env:VERSION-windows-amd64.zip"
          echo "Created ZIP package:"
          Get-ChildItem *.zip

      - name: Build NSIS installer (EXE)
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$env:VERSION releng\installer\nsis\ocicl.nsi
          echo "Created NSIS installer:"
          Get-ChildItem releng\installer\nsis\*.exe

      - name: Install WiX Toolset
        shell: powershell
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2 -g

      - name: Build MSI installer
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Copy-Item "ocicl.exe" "releng\installer\wix\"
          Copy-Item "LICENSE" "releng\installer\wix\"
          Copy-Item "README.md" "releng\installer\wix\"
          Copy-Item "THIRD-PARTY-LICENSES.txt" "releng\installer\wix\"
          cd releng\installer\wix
          wix build ocicl.wxs -o "..\..\..\ocicl-$env:VERSION.msi" -d VERSION=$env:VERSION -d SourceDir=. -ext WixToolset.UI.wixext
          cd ..\..\..
          echo "Created MSI installer:"
          Get-ChildItem *.msi

      - name: List all packages
        run: |
          echo "Built packages:"
          ls -lh *.zip *.msi releng/installer/nsis/*.exe 2>/dev/null || true
