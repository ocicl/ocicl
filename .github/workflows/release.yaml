name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  # ========================================
  # Extract version from tag
  # ========================================
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ========================================
  # Build Linux packages (RPM and DEB)
  # ========================================
  build-rpm:
    needs: extract-version
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rpm-sign sbcl libfixposix-devel gcc make

      - name: Setup rpmbuild directory
        run: |
          rpmdev-setuptree

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Create source tarball
        run: |
          cd ..
          tar czf ~/rpmbuild/SOURCES/ocicl-${VERSION}.tar.gz \
            --transform "s,^ocicl,ocicl-${VERSION}," \
            ocicl

      - name: Update spec file version
        run: |
          sed -i "s/^Version:.*/Version:        ${VERSION}/" releng/ocicl.spec
          cp releng/ocicl.spec ~/rpmbuild/SPECS/

      - name: Build RPM and SRPM
        run: |
          cd ~/rpmbuild/SPECS
          rpmbuild -ba ocicl.spec

      - name: Verify version is not dirty
        run: |
          OCICL_BIN=$(find ~/rpmbuild/BUILD -name ocicl -type f -executable | head -1)
          VERSION=$("$OCICL_BIN" version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Sign RPMs
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          # Configure gpg for non-interactive use BEFORE first gpg invocation
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          # Import signing key
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_NAME=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid/{print $10; exit}')
          echo "Signing as: ${GPG_NAME}"
          # Configure rpm macros — only set key name, use default sign command
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${GPG_NAME}" >> ~/.rpmmacros
          # Sign packages
          rpmsign --addsign ~/rpmbuild/RPMS/x86_64/*.rpm
          rpmsign --addsign ~/rpmbuild/SRPMS/*.src.rpm || true
          # Import public key into rpm db and verify
          gpg --export --armor "${GPG_NAME}" | rpm --import -
          rpm --checksig ~/rpmbuild/RPMS/x86_64/*.rpm

      - name: Copy RPM and SRPM to workspace
        run: |
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ${GITHUB_WORKSPACE}/ || true
          cp ~/rpmbuild/SRPMS/*.src.rpm ${GITHUB_WORKSPACE}/ || true

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-packages
          path: ./*.rpm

  build-deb:
    needs: extract-version
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y debhelper devscripts sbcl libfixposix-dev gcc make gpg debsigs

      - name: Update changelog version
        run: |
          sed -i "s/^ocicl (.*)/ocicl (${VERSION}-1) unstable; urgency=medium/" releng/debian/changelog

      - name: Build DEB packages (binary and source)
        run: |
          ln -s releng/debian debian
          dpkg-buildpackage -uc -us

      - name: Verify version is not dirty
        run: |
          VERSION=$(./ocicl version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Sign DEB packages
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          # Configure gpg for non-interactive use
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          # Import signing key
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_NAME=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid/{print $10; exit}')
          echo "Signing as: ${GPG_NAME}"
          # Sign .deb packages
          GPG_KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          for deb in ../*.deb; do
            debsigs --sign=origin -k "${GPG_KEYID}" "${deb}"
          done

      - name: Copy DEB and source files to workspace
        run: |
          cp ../*.deb . 2>/dev/null || true
          cp ../*.dsc . 2>/dev/null || true
          cp ../*.tar.* . 2>/dev/null || true
          cp ../*.buildinfo . 2>/dev/null || true
          cp ../*.changes . 2>/dev/null || true

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-packages
          path: |
            ./*.deb
            ./*.dsc
            ./*.tar.*
            ./*.buildinfo
            ./*.changes

  # ========================================
  # Build Linux standalone tarball
  # ========================================
  build-linux-tarball:
    needs: extract-version
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y sbcl libfixposix-dev gcc make

      - name: Build
        run: sbcl --load setup.lisp

      - name: Verify version is not dirty
        run: |
          VERSION=$(./ocicl version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Collect third-party licenses
        run: |
          ./ocicl collect-licenses > THIRD-PARTY-LICENSES.txt

      - name: Generate SBOMs
        run: |
          ./ocicl create-sbom cyclonedx ocicl-sbom.json
          ./ocicl create-sbom spdx ocicl-sbom.spdx.json

      - name: Package Linux binary (tar.gz)
        run: |
          mkdir -p dist
          cp ocicl README.md LICENSE THIRD-PARTY-LICENSES.txt dist/
          tar czf "ocicl-${VERSION}-linux-amd64.tar.gz" -C dist .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-package
          path: |
            ./*.tar.gz
            ./ocicl-sbom.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: |
            ./ocicl-sbom.json
            ./ocicl-sbom.spdx.json

  # ========================================
  # Build Windows executable and installers
  # ========================================
  build-windows:
    needs: [build-linux-tarball, extract-version]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download SBOMs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom
          path: .

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install SBCL and build tools
        shell: powershell
        run: |
          choco install -y sbcl nsis

      - name: Build
        run: sbcl --load setup.lisp

      - name: Verify version is not dirty
        run: |
          VERSION=$(./ocicl.exe version 2>&1 || true)
          echo "ocicl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Collect third-party licenses
        run: |
          ./ocicl.exe collect-licenses > THIRD-PARTY-LICENSES.txt

      - name: Package Windows binary (ZIP)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item ocicl.exe, README.md, LICENSE, THIRD-PARTY-LICENSES.txt, ocicl-sbom.spdx.json -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath "ocicl-$env:VERSION-windows-amd64.zip"

      - name: Build NSIS installer (EXE)
        shell: powershell
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$env:VERSION releng\installer\nsis\ocicl.nsi
          Move-Item "releng\installer\nsis\ocicl-$env:VERSION-setup.exe" "."

      - name: Install WiX Toolset
        shell: powershell
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2 -g

      - name: Build MSI installer
        shell: powershell
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          # Copy files to wix directory for building
          Copy-Item "ocicl.exe" "releng\installer\wix\"
          Copy-Item "LICENSE" "releng\installer\wix\"
          Copy-Item "README.md" "releng\installer\wix\"
          Copy-Item "THIRD-PARTY-LICENSES.txt" "releng\installer\wix\"
          Copy-Item "ocicl-sbom.spdx.json" "releng\installer\wix\"
          cd releng\installer\wix
          wix build ocicl.wxs -o "..\..\..\ocicl-$env:VERSION.msi" -d VERSION=$env:VERSION -d SourceDir=. -ext WixToolset.UI.wixext

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-package
          path: |
            ./*.zip
            ./*-setup.exe
            ./*.msi

  # ========================================
  # Test Linux build
  # ========================================
  test-linux:
    needs: [build-linux-tarball, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: linux-package
          path: artifacts

      - name: Extract and install ocicl
        run: |
          tar xzf artifacts/ocicl-${VERSION}-linux-amd64.tar.gz
          chmod +x ocicl
          sudo mv ocicl /usr/local/bin/

      - name: Setup ocicl
        run: |
          ocicl setup > ~/.sbclrc

      - name: Test downloading pure-tls
        run: |
          mkdir test-project && cd test-project
          ocicl install pure-tls
          echo "Successfully downloaded pure-tls"
          ls -la ocicl/

  # ========================================
  # Test Windows build
  # ========================================
  test-windows:
    needs: [build-windows, extract-version]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Install SBCL
        shell: powershell
        run: |
          choco install -y sbcl

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-package
          path: artifacts

      - name: Extract and install ocicl
        shell: powershell
        run: |
          Expand-Archive -Path "artifacts\ocicl-$env:VERSION-windows-amd64.zip" -DestinationPath "ocicl-bin"
          Copy-Item "ocicl-bin\ocicl.exe" -Destination "C:\Windows\System32\"

      - name: Setup ocicl
        shell: bash
        run: |
          ocicl setup > ~/.sbclrc

      - name: Test downloading pure-tls
        shell: bash
        run: |
          mkdir test-project && cd test-project
          ocicl install pure-tls
          echo "Successfully downloaded pure-tls"
          ls -la ocicl/

  # ========================================
  # Build Chocolatey package
  # ========================================
  build-chocolatey:
    needs: [build-windows, extract-version]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-package
          path: artifacts

      - name: Get checksum
        id: info
        shell: bash
        run: |
          CHECKSUM=$(sha256sum artifacts/ocicl-${VERSION}-windows-amd64.zip | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update Chocolatey package
        shell: bash
        env:
          CHECKSUM: ${{ steps.info.outputs.checksum }}
        run: |
          # Update nuspec version
          sed -i "s/<version>.*<\/version>/<version>${VERSION}<\/version>/" releng/chocolatey/ocicl.nuspec

          # Update install script with version and checksum
          sed -i "s/__VERSION__/${VERSION}/g" releng/chocolatey/tools/chocolateyInstall.ps1
          sed -i "s/__CHECKSUM__/${CHECKSUM}/g" releng/chocolatey/tools/chocolateyInstall.ps1

      - name: Build Chocolatey package
        shell: powershell
        run: |
          cd releng\chocolatey
          choco pack

      - name: Upload Chocolatey package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chocolatey-package
          path: releng/chocolatey/*.nupkg

  # ========================================
  # Sign Linux tarball with Cosign (keyless)
  # ========================================
  sign-artifacts:
    needs: [build-linux-tarball, extract-version]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: linux-package
          path: ./artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign binary tarball with Cosign
        run: |
          cd artifacts
          cosign sign-blob --yes \
            --bundle ocicl-${VERSION}-linux-amd64.tar.gz.bundle \
            ocicl-${VERSION}-linux-amd64.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-package
          path: |
            artifacts/ocicl-${{ env.VERSION }}-linux-amd64.tar.gz.bundle

  # ========================================
  # Generate SLSA Level 3 provenance
  # ========================================
  generate-provenance-subjects:
    needs: [build-linux-tarball, build-rpm, build-deb, build-windows, extract-version]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          cd artifacts
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*-setup.exe' -o -name '*.msi' \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    needs: [generate-provenance-subjects]
    permissions:
      actions: read
      id-token: write
      contents: write
    # NOTE: SLSA generator requires a tag ref, not a commit SHA — it validates
    # the builder binary against the release tag. Pinning to SHA breaks it.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.generate-provenance-subjects.outputs.hashes }}"
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  # ========================================
  # Create GitHub Release
  # ========================================
  release:
    needs: [build-rpm, build-deb, build-linux-tarball, build-windows, build-chocolatey, sign-artifacts, slsa-provenance, test-linux, test-windows, extract-version]
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate consolidated checksums
        run: |
          cd artifacts
          sha256sum \
            linux-package/ocicl-${VERSION}-linux-amd64.tar.gz \
            linux-package/ocicl-sbom.json \
            windows-package/ocicl-${VERSION}-windows-amd64.zip \
            windows-package/ocicl-${VERSION}-setup.exe \
            windows-package/ocicl-${VERSION}.msi \
            rpm-packages/*.rpm \
            deb-packages/*.deb \
            > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: docs/release-notes/RELEASE-NOTES-${{ env.VERSION }}.md
          artifacts: |
            artifacts/rpm-packages/*.rpm
            artifacts/deb-packages/*.deb
            artifacts/deb-packages/*.dsc
            artifacts/deb-packages/*.tar.*
            artifacts/linux-package/*.tar.gz
            artifacts/linux-package/ocicl-sbom.json
            artifacts/signed-package/*.bundle
            artifacts/windows-package/*.zip
            artifacts/windows-package/*-setup.exe
            artifacts/windows-package/*.msi
            artifacts/chocolatey-package/*.nupkg
            artifacts/checksums.sha256
          allowUpdates: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/rpm-packages/*.rpm
            artifacts/deb-packages/*.deb
            artifacts/linux-package/*.tar.gz
            artifacts/windows-package/*.zip
            artifacts/windows-package/*-setup.exe
            artifacts/windows-package/*.msi

  # ========================================
  # Build RPM repository metadata
  # ========================================
  build-rpm-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install createrepo_c
        run: sudo apt-get install -y createrepo-c

      - name: Download RPM assets from release
        run: |
          mkdir -p /tmp/rpms
          gh release download "${TAG}" --pattern '*.rpm' --dir /tmp/rpms --skip-existing
          echo "Downloaded RPMs:"
          ls -lh /tmp/rpms/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build repodata
        run: createrepo_c /tmp/rpms

      - name: Rewrite package locations to release asset URLs
        run: |
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cd /tmp/rpms/repodata

          # Decompress primary.xml
          gunzip -f *-primary.xml.gz
          PRIMARY=$(ls *-primary.xml)

          # Replace relative hrefs with absolute GitHub URLs
          sed -i "s|<location href=\"\([^\"]*\.rpm\)\"|<location href=\"${BASE}/\1\"|g" "${PRIMARY}"

          # Recompress
          gzip -9 "${PRIMARY}"

          # Rebuild repomd.xml with correct checksums
          cd /tmp/rpms
          REPODATA=repodata

          cat > "${REPODATA}/repomd.xml" <<'XMLHEADER'
          <?xml version="1.0" encoding="UTF-8"?>
          <repomd xmlns="http://linux.duke.edu/metadata/repo">
          XMLHEADER

          for gz in "${REPODATA}"/*.xml.gz; do
            fname="$(basename "${gz}")"
            # Type is e.g. "primary" from "abc123-primary.xml.gz"
            type="$(echo "${fname}" | sed 's/.*-\([a-z_]*\)\.xml\.gz/\1/')"

            checksum="$(sha256sum "${gz}" | awk '{print $1}')"
            size="$(stat -c%s "${gz}")"

            open_file="${gz%.gz}"
            gunzip -k -f "${gz}"
            open_checksum="$(sha256sum "${open_file}" | awk '{print $1}')"
            open_size="$(stat -c%s "${open_file}")"
            rm -f "${open_file}"

            cat >> "${REPODATA}/repomd.xml" <<XMLDATA
            <data type="${type}">
              <checksum type="sha256">${checksum}</checksum>
              <open-checksum type="sha256">${open_checksum}</open-checksum>
              <location href="repodata/${fname}"/>
              <size>${size}</size>
              <open-size>${open_size}</open-size>
            </data>
          XMLDATA
          done

          echo "</repomd>" >> "${REPODATA}/repomd.xml"

          # Clean up indentation from heredoc
          sed -i 's/^          //' "${REPODATA}/repomd.xml"

      - name: Sign repomd.xml and export public key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          gpg --batch --detach-sign --armor /tmp/rpms/repodata/repomd.xml
          gpg --batch --export --armor > /tmp/rpms/RPM-GPG-KEY-ocicl

      - name: Upload RPM repo artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-repo
          path: /tmp/rpms/repodata/
          include-hidden-files: false

      - name: Upload RPM GPG key
        if: ${{ hashFiles('/tmp/rpms/RPM-GPG-KEY-ocicl') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-repo-key
          path: /tmp/rpms/RPM-GPG-KEY-ocicl

  # ========================================
  # Build DEB repository metadata
  # ========================================
  build-deb-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install APT repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gpg

      - name: Download DEB assets from release
        run: |
          mkdir -p /tmp/debs
          gh release download "${TAG}" --pattern '*.deb' --dir /tmp/debs --skip-existing
          echo "Downloaded DEBs:"
          ls -lh /tmp/debs/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"
          # Export public key for the repo
          gpg --batch --export --armor > /tmp/debs/ocicl-archive-keyring.gpg

      - name: Build APT repository
        run: |
          REPO_DIR=/tmp/apt-repo
          mkdir -p "${REPO_DIR}/pool/main"
          mkdir -p "${REPO_DIR}/dists/stable/main/binary-amd64"

          # Copy new .deb files to pool
          cp /tmp/debs/*.deb "${REPO_DIR}/pool/main/"

          # Keep only the latest .deb for each package name (avoid repo bloat)
          cd "${REPO_DIR}/pool/main"
          for pkg in $(ls *.deb | sed 's/_[0-9].*//' | sort -u); do
            # Keep only the newest version of each package
            ls -t ${pkg}_*.deb | tail -n +2 | xargs rm -f 2>/dev/null || true
          done
          cd "${REPO_DIR}"

          # Generate Packages file
          dpkg-scanpackages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: ocicl
          Label: ocicl
          Suite: stable
          Codename: stable
          Date: $(date -Ru)
          Architectures: amd64
          Components: main
          Description: ocicl APT repository
          EOF
          sed -i 's/^          //' Release

          # Add checksums to Release file
          {
            echo "MD5Sum:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              SIZE=$(stat -c%s "$f")
              MD5=$(md5sum "$f" | awk '{print $1}')
              printf " %s %16d %s\n" "$MD5" "$SIZE" "$f"
            done
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              SIZE=$(stat -c%s "$f")
              SHA=$(sha256sum "$f" | awk '{print $1}')
              printf " %s %16d %s\n" "$SHA" "$SIZE" "$f"
            done
          } >> Release

      - name: Sign Release file
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          cd /tmp/apt-repo/dists/stable
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Upload DEB repo artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-repo
          path: /tmp/apt-repo/

      - name: Upload DEB keyring
        if: ${{ hashFiles('/tmp/debs/ocicl-archive-keyring.gpg') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-repo-key
          path: /tmp/debs/ocicl-archive-keyring.gpg

  # ========================================
  # Deploy package repos + docs to GitHub Pages
  # ========================================
  deploy-pages:
    needs: [build-rpm-repo, build-deb-repo, extract-version]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download RPM repo artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rpm-repo
          path: docs/rpm-repo/repodata

      - name: Download RPM GPG key
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rpm-repo-key
          path: docs/rpm-repo
        continue-on-error: true

      - name: Download DEB repo artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb-repo
          path: docs/deb-repo

      - name: Download DEB keyring
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb-repo-key
          path: docs/deb-repo
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac553fd0d31 # v4
